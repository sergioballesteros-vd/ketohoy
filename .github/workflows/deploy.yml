name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_SHA="${{ github.sha }}"
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/keto-mercadona}"
            TMP_DIR="$(mktemp -d)"
            trap 'rm -rf "$TMP_DIR"' EXIT
            echo "Deploying ${DEPLOY_SHA}"
            git init "$TMP_DIR" >/dev/null
            git -C "$TMP_DIR" remote add origin https://github.com/sergioballesteros-vd/ketohoy.git
            git -C "$TMP_DIR" fetch --depth 1 origin "$DEPLOY_SHA"
            git -C "$TMP_DIR" checkout --force FETCH_HEAD
            rsync -a --delete \
              --exclude '.env' \
              --exclude '.env.local' \
              --exclude 'dev.db' \
              "$TMP_DIR"/ "$DEPLOY_PATH"/
            cd "$DEPLOY_PATH"
            printf '%s\n' "$DEPLOY_SHA" > .deploy-sha
            printf 'DATABASE_URL=file:./dev.db\nUNSPLASH_ACCESS_KEY=%s\n' "${{ secrets.UNSPLASH_ACCESS_KEY }}" > .env.local
            export DATABASE_URL="file:./dev.db"
            npm ci --include=dev --no-audit --no-fund
            npx prisma db push
            npm run build
            pm2 restart ${{ secrets.PM2_APP_NAME }} --update-env
            sleep 5
            test "$(cat .deploy-sha)" = "$DEPLOY_SHA"
            curl -fsS --max-time 15 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' http://127.0.0.1:3000/explore | \
              grep -q '1. Explorar productos' && \
            curl -fsS --max-time 15 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' http://127.0.0.1:3000/explore | \
              grep -q 'Añadir a compra' && \
            curl -fsS --max-time 15 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' http://127.0.0.1:3000/explore | \
              grep -q 'Tu lista está vacía.'
