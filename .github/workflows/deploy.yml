name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_SHA="${{ github.sha }}"
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/keto-mercadona}"
            TMP_DIR="$(mktemp -d)"
            trap 'rm -rf "$TMP_DIR"' EXIT
            echo "Deploying ${DEPLOY_SHA}"
            git init "$TMP_DIR" >/dev/null
            git -C "$TMP_DIR" remote add origin https://github.com/sergioballesteros-vd/ketohoy.git
            git -C "$TMP_DIR" fetch --depth 1 origin "$DEPLOY_SHA"
            git -C "$TMP_DIR" checkout --force FETCH_HEAD
            rsync -a --delete \
              --exclude '.env' \
              --exclude '.env.local' \
              --exclude 'dev.db' \
              "$TMP_DIR"/ "$DEPLOY_PATH"/
            cd "$DEPLOY_PATH"
            printf '%s\n' "$DEPLOY_SHA" > .deploy-sha
            printf 'DATABASE_URL=file:./dev.db\nUNSPLASH_ACCESS_KEY=%s\n' "${{ secrets.UNSPLASH_ACCESS_KEY }}" > .env.local
            export DATABASE_URL="file:./dev.db"
            npm ci --include=dev --no-audit --no-fund
            cp -f dev.db dev.db.deploy-backup 2>/dev/null || true
            npx prisma db push --accept-data-loss
            npx prisma generate
            npx prisma db seed
            RECIPE_IMAGE_BACKFILL_LIMIT=40 npx tsx prisma/backfillRecipeImages.ts
            npm run build
            pwd
            ls -la
            APP_NAME="${{ secrets.PM2_APP_NAME }}"
            pm2 describe "$APP_NAME" || true
            pm2 delete "$APP_NAME" || true
            if command -v lsof >/dev/null 2>&1; then
              STALE_PIDS="$(lsof -tiTCP:3000 -sTCP:LISTEN || true)"
              if [ -n "$STALE_PIDS" ]; then
                echo "Killing stale process(es) on port 3000: $STALE_PIDS"
                kill $STALE_PIDS || true
                sleep 2
              fi
            elif command -v fuser >/dev/null 2>&1; then
              fuser -k 3000/tcp || true
              sleep 2
            fi
            PORT=3000 pm2 start npm --name "$APP_NAME" -- start
            pm2 save
            sleep 8
            pm2 describe "$APP_NAME"
            ss -ltnp | grep ':3000' || true
            test "$(cat .deploy-sha)" = "$DEPLOY_SHA"
            curl -fsSI --retry 5 --retry-delay 2 --max-time 15 \
              -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' \
              http://127.0.0.1:3000/explore | tee /tmp/explore-local.headers
            ! grep -qi '^x-nextjs-prerender:' /tmp/explore-local.headers
            curl -fsSI --max-time 15 \
              -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' \
              http://152.228.142.57:3000/explore | tee /tmp/explore-public.headers
            ! grep -qi '^x-nextjs-prerender:' /tmp/explore-public.headers
